name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  WIF_PROVIDER: projects/938361928218/locations/global/workloadIdentityPools/github/providers/github-actions
  WIF_SERVICE_ACCOUNT: github-actions@madhav-astrology.iam.gserviceaccount.com

jobs:
  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # Mirrors platform/cloudbuild.yaml copy-governance-files step.
      # Without this, the Dockerfile's COPY for 00_ARCHITECTURE and
      # 035_DISCOVERY_LAYER fails — those dirs live at the repo root, not in platform/.
      - name: Copy governance files into platform build context
        run: |
          mkdir -p platform/00_ARCHITECTURE
          cp 00_ARCHITECTURE/CAPABILITY_MANIFEST.json platform/00_ARCHITECTURE/CAPABILITY_MANIFEST.json
          cp 00_ARCHITECTURE/manifest_overrides.yaml platform/00_ARCHITECTURE/manifest_overrides.yaml
          cp -r 035_DISCOVERY_LAYER platform/035_DISCOVERY_LAYER

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: ./platform/Dockerfile
          push: true
          tags: |
            asia-south1-docker.pkg.dev/madhav-astrology/amjis/amjis-web:${{ github.sha }}
            asia-south1-docker.pkg.dev/madhav-astrology/amjis/amjis-web:latest
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Deploy web to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: amjis-web
          region: ${{ env.GCP_REGION }}
          image: asia-south1-docker.pkg.dev/madhav-astrology/amjis/amjis-web:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            INSTANCE_CONNECTION_NAME=madhav-astrology:asia-south1:amjis-postgres
            DB_USER=amjis_app
            DB_NAME=amjis
            GCP_PROJECT=madhav-astrology
            GCS_BUCKET_CHAT_ATTACHMENTS=madhav-astrology-chat-attachments
            GCS_BUCKET_CHART_DOCUMENTS=madhav-astrology-chart-documents
            ASTROLOGER_EMAIL=mail.abhisek.mohanty@gmail.com
            PYTHON_SIDECAR_URL=https://amjis-sidecar-938361928218.asia-south1.run.app
            BUILD_STATE_GCS_BASE=https://storage.googleapis.com/madhav-marsys-build-artifacts
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          secrets: |
            FIREBASE_ADMIN_CREDENTIALS=firebase-admin-credentials:latest
            DB_PASSWORD=amjis-db-password:latest
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            GOOGLE_GENERATIVE_AI_API_KEY=GOOGLE_GENERATIVE_AI_API_KEY:latest
            DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest
            PYTHON_SIDECAR_API_KEY=PYTHON_SIDECAR_API_KEY:latest
            SUPER_ADMIN_EMAIL=SUPER_ADMIN_EMAIL:latest

      - name: Show deployment URL
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: echo "Deployed to $DEPLOY_URL"

  deploy-sidecar:
    name: Build & Deploy Sidecar
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push sidecar image
        uses: docker/build-push-action@v6
        with:
          context: ./platform/python-sidecar
          file: ./platform/python-sidecar/Dockerfile
          push: true
          tags: |
            asia-south1-docker.pkg.dev/madhav-astrology/amjis/amjis-sidecar:${{ github.sha }}
            asia-south1-docker.pkg.dev/madhav-astrology/amjis/amjis-sidecar:latest

      - name: Deploy sidecar to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: amjis-sidecar
          region: ${{ env.GCP_REGION }}
          image: asia-south1-docker.pkg.dev/madhav-astrology/amjis/amjis-sidecar:${{ github.sha }}
          secrets: |
            PYTHON_SIDECAR_API_KEY=PYTHON_SIDECAR_API_KEY:latest
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            GOOGLE_GENERATIVE_AI_API_KEY=GOOGLE_GENERATIVE_AI_API_KEY:latest
