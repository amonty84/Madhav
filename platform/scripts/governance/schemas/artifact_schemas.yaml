# Artifact-class frontmatter required-fields map.
#
# # Implements: GOVERNANCE_INTEGRITY_PROTOCOL_v1_0.md §I.3.1
#
# Each top-level key is an artifact class. Values:
#   path_glob         — glob(s) under which files of this class live
#   required_frontmatter — list of required top-level YAML frontmatter keys
#   optional_frontmatter — list of optional keys (informational; absence not flagged)
#   notes             — human-readable gloss
#
# The schema validator loads this config; it is NOT hard-coded in the script.
# Schema extensions land here, not in the .py file.

architecture_governance:
  path_glob:
    - "00_ARCHITECTURE/*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - supersedes
    - produced_during
    - changelog
    - authoritative_side
    - mirror_obligations
    - consumers
    - date
    - schema
  notes: >
    Architecture / Governance artifacts must name themselves (`artifact`), declare a version,
    and carry a status (DRAFT_PENDING_REDTEAM / CURRENT / LIVE / LIVING / CLOSED / SUPERSEDED).

l1_facts:
  path_glob:
    - "01_FACTS_LAYER/FORENSIC_ASTROLOGICAL_DATA_v*.md"
    - "01_FACTS_LAYER/LIFE_EVENT_LOG_v*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - subject
    - source_hash
    - supersedes
  notes: >
    L1 facts class. `subject` and `source_hash` SHOULD be present but are optional
    for v1.0-era predecessors. Newer L1 files MUST carry both.

l2_5_msr:
  path_glob:
    - "025_HOLISTIC_SYNTHESIS/MSR_v*.md"
  required_frontmatter:
    - artifact
    - version
    - status
    - signal_count
  optional_frontmatter:
    - canonical_path
    - supersedes
    - unification_session
  notes: >
    MSR per PROJECT_ARCHITECTURE §G. signal_count is numeric; must match the actual
    signal count when schema validator computes it (future extension; v1.0 checks
    presence only).

l2_5_ucn:
  path_glob:
    - "025_HOLISTIC_SYNTHESIS/UCN_v*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - parts
    - part_precedence
  notes: "UCN per PROJECT_ARCHITECTURE §G."

l2_5_cdlm:
  path_glob:
    - "025_HOLISTIC_SYNTHESIS/CDLM_v*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - grid_dimensions
    - cell_count

l2_5_rm:
  path_glob:
    - "025_HOLISTIC_SYNTHESIS/RM_v*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - element_count
    - element_subtypes

l2_5_cgm:
  path_glob:
    - "025_HOLISTIC_SYNTHESIS/CGM_v*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - node_count
    - edge_count
    - rebuild_base_l1

l3_domain_reports:
  path_glob:
    - "03_DOMAIN_REPORTS/REPORT_*.md"
  required_frontmatter:
    - artifact
    - version
    - status
  optional_frontmatter:
    - domain
    - l1_basis_version
    - l2_5_basis_version
  notes: >
    L3 domain reports. Pre-existing files may lack some frontmatter — flag as LOW until
    corpus-wide frontmatter retrofit (scheduled at Step 12 ongoing hygiene).

# ------------------------------------------------------------------------------------
# SESSION_LOG entry schema (post-Step-10 adoption point)
# ------------------------------------------------------------------------------------
# Step 10 installs SESSION_LOG_SCHEMA_v1_0.md; entries below the adoption-point horizontal
# rule in SESSION_LOG.md conform to that schema's §2 structure. This class is consumed by
# `validate_session_log_entries()` in schema_validator.py — it does NOT use the generic
# `path_glob + required_frontmatter` mechanism because SESSION_LOG is a single file with
# many entries rather than one-file-per-artifact. The presence of this class in the YAML
# is the configuration handle: the adoption-point marker and the required fields are
# declared here so the Python code stays thin.
session_log_entry:
  # NOTE: No `path_glob` on purpose. SESSION_LOG.md does NOT carry top-level frontmatter
  # (it's a multi-entry append-only log); the generic `validate_frontmatter_for_class()`
  # pass should skip this class. The custom `validate_session_log_entries()` handles the
  # file via the hardcoded path `00_ARCHITECTURE/SESSION_LOG.md`.
  target_path: "00_ARCHITECTURE/SESSION_LOG.md"
  adoption_point_marker: "# Schema adoption point"
  schema_pointer: "00_ARCHITECTURE/SESSION_LOG_SCHEMA_v1_0.md"
  required_blocks:
    - session_open_yaml     # §2.b
    - body                  # §2.c
    - session_close_yaml    # §2.e
    - next_session_objective  # §2.f
  forbidden_body_patterns:
    - "(?mi)^\\*\\*Next session objective\\*\\*:\\s*Choose from"  # §4 menu-form
  session_id_field_names:
    heading_regex: '^## ([A-Z0-9_]+)\s+—'    # §2.a — group 1 captures session_id
    open_yaml_path: "session_open.session_id"
    close_yaml_path: "session_close.session_id"
  notes: >
    Validates post-adoption entries for §2 structural presence + §4 menu-form prohibition +
    §1.4 cross-surface session_id consistency (heading ↔ session_open ↔ session_close).
    Historical entries above the adoption-point marker are preserved verbatim per §6 and
    NOT validated. Violations: missing session_open_yaml or session_close_yaml → CRITICAL;
    session_id disagreement → HIGH; menu-form next-objective → HIGH; missing terminator →
    LOW (informational). See `schema_validator.py validate_session_log_entries()`.

# ------------------------------------------------------------------------------------
# learning_layer_stub (Step 12 addition — ONGOING_HYGIENE_POLICIES_v1_0.md §G + LL scaffold §5.7)
# ------------------------------------------------------------------------------------
learning_layer_stub:
  path_glob:
    - "06_LEARNING_LAYER/*/README.md"
  required_frontmatter:
    - artifact
    - mechanism_id           # LL.1 .. LL.10
    - status                  # STUB | ACTIVE
    - produced_during
  optional_frontmatter:
    - activation_session_id
    - activation_lel_entry
    - activation_ppl_entry
    - writes_to
    - first_firing_N
  required_body_banner:
    regex: "^STATUS:\\s*(STUB|ACTIVE)\\s*[—-]\\s*.*$"
    rationale: "Rule 1 per ONGOING_HYGIENE_POLICIES §G: STATUS banner must be present"
  population_gate:
    when: "status == ACTIVE"
    require_any_of:
      - activation_lel_entry
      - activation_ppl_entry
    require_all_of:
      - activation_session_id
    rationale: "Rule 2 per ONGOING_HYGIENE_POLICIES §G + LL_SCAFFOLD §5.2: no ACTIVE without LEL/PPL"
  classical_priors_locked:
    writes_to_must_be_under: "06_LEARNING_LAYER/"
    rationale: "Rule 3 per LL_SCAFFOLD §5.5: learning modulates, never overwrites priors"
  notes: >
    Validated by `validate_learning_layer_stub()` in schema_validator.py. Fires at every
    corpus-level validation run and at any session whose files_touched includes a
    `06_LEARNING_LAYER/*/README.md` path. Guards the LL.1–LL.4 stubs scaffolded at Step 11
    and any LL.5+ mechanisms added post-M3 per MACRO_PLAN §Learning Layer.

# ------------------------------------------------------------------------------------
# session_close extensions (Step 12 addition — ONGOING_HYGIENE_POLICIES §C, §D, §F)
# ------------------------------------------------------------------------------------
session_close:
  # This class is NOT path-globbed; session_close YAML blocks appear inside SESSION_LOG
  # entries and are cross-validated by `validate_close_checklist_yaml()`. The class is
  # declared here so §C/§D/§F extensions have a named handle.
  required_fields:
    - session_id
    - closed_at
    - files_touched
    - registry_updates_made
    - mirror_updates_propagated
    - drift_detector_run
    - schema_validator_run
    - mirror_enforcer_run
    - session_log_appended
    - close_criteria_met
    - unblocks
    - handoff_notes
  scope_boundary:
    # §C — every files_touched path must match declared_scope.may_touch and must NOT
    # match must_not_touch. Cross-ref via `--session-open-for-close` CLI flag.
    rule: "files_touched ⊆ may_touch AND files_touched ∩ must_not_touch = ∅"
    severity: HIGH
    rationale: "ONGOING_HYGIENE_POLICIES_v1_0.md §C closes GA.20 at close-checklist layer"
  files_touched_completeness:
    # §D — fingerprint-delta set must equal files_touched set (with justifying reasons
    # for files that appear in one but not the other).
    rule: "fingerprint_delta_set == files_touched_set OR reason ∈ {created_this_session, reviewed_not_modified, status_flag_only, banner_only, frontmatter_flip_only, superseded_this_session}"
    severity: HIGH
    rationale: "ONGOING_HYGIENE_POLICIES_v1_0.md §D closes GA.21"
  exit_code_whitelist:
    # §F — exit_code=3 passes iff known_residuals block present + every residual MEDIUM/LOW + booking reference
    allowed_zero: true
    allowed_three_conditional: true
    forbidden: [1, 2, 4, 5, 6, 7, 8, 9]
    rationale: "ONGOING_HYGIENE_POLICIES_v1_0.md §F + closes Step 8 red-team F.2"
  known_residuals_schema:
    # When exit_code=3, each entry in known_residuals must carry:
    required_per_entry:
      - finding_id
      - severity   # MEDIUM | LOW only
      - booking_reference   # step_id + rationale
  notes: >
    session_close class consolidates the rules validate_close_checklist_yaml enforces.
    Extensions land here rather than in the Python file.

# ------------------------------------------------------------------------------------
# disagreement_register_entry (Step 12 addition — F.3 closure, protocol §K.4)
# ------------------------------------------------------------------------------------
disagreement_register_entry:
  # Validated by `validate_dr_entry_yaml()` via --dr-entry CLI mode.
  required_fields:
    - entry_id
    - opened_on
    - class
    - claude_position
    - gemini_position
    - arbitration_status
    - status
  optional_fields:
    - resolved_on
    - resolution
    - protocol_section
    - evidence_pointers
  allowed_classes:
    - DIS.class.mirror_desync
    - DIS.class.schema_interpretation
    - DIS.class.derivation_conflict
    - DIS.class.forensic_conflict
    - DIS.class.ethics_disagreement
  notes: >
    Closes Step 8 red-team F.3 (no --dr-entry validator mode). The allowed_classes set
    is the five classes declared in protocol §K.2.

# ------------------------------------------------------------------------------------
# CURRENT_STATE schema
# ------------------------------------------------------------------------------------
# Step 10 produces CURRENT_STATE_v1_0.md as the authoritative post-rebuild state-surface.
# This class validates the file's required fields. Consumed by `validate_current_state()`.
current_state:
  path_glob:
    - "00_ARCHITECTURE/CURRENT_STATE_v1_0.md"
  required_frontmatter:
    - artifact
    - version
    - status
    - role
  optional_frontmatter:
    - implements
    - supersedes
    - mirror_obligations
    - update_rules
    - consumers
    - changelog
  required_state_block_fields:
    # Fields that must appear inside the §2 `current_state:` YAML fence.
    - active_macro_phase
    - active_macro_phase_status
    - active_phase_plan
    - active_phase_plan_version
    - active_governance_step
    - active_governance_step_status
    - next_governance_step
    - next_governance_step_status
    - last_session_id
    - last_session_closed_at
    - next_session_objective
    - file_updated_at
    - file_updated_by_session
  notes: >
    The §2 canonical state block is a `current_state:` YAML fence inside the markdown body.
    The validator extracts that fence and confirms the required fields are present. Field
    values are NOT range-checked in v1.0 (presence-only), but `validate_current_state()`
    cross-checks `last_session_id` against SESSION_LOG's tail entry and
    `active_governance_step` against STEP_LEDGER's current `in_progress`/`completed` row
    during the rebuild era. Disagreements are MEDIUM violations (this file is
    rebuild-era-secondary per §5.1 of CURRENT_STATE_v1_0.md).
