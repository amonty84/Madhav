steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - platform/python-sidecar/Dockerfile.pipeline
      - --build-arg
      - PIPELINE_VERSION=v1.0.6
      - -t
      - asia-south1-docker.pkg.dev/madhav-astrology/marsys-pipeline/pipeline:v1.0.6
      - .
images:
  - asia-south1-docker.pkg.dev/madhav-astrology/marsys-pipeline/pipeline:v1.0.6
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
