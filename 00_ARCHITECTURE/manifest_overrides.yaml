# manifest_overrides.yaml — curated per-asset metadata
# These fields supplement auto-derived entries in CAPABILITY_MANIFEST.json
# Merged by the Manifest Builder during build
#
# path_pattern: optional substring match against entry.path for files whose
# frontmatter canonical_id does not exactly match the override key.

overrides:
  FORENSIC:
    path_pattern: "FORENSIC_ASTROLOGICAL_DATA_v8_0"
    preferred_for: [factual, interpretive, predictive, holistic]
    cost_weight: 1.0
    always_required: true
  CGM:
    preferred_for: [interpretive, cross_domain, holistic]
    cost_weight: 1.0
    always_required: true
  UCN:
    path_pattern: "UCN_v4_0"
    preferred_for: [interpretive, cross_domain, holistic]
    cost_weight: 0.8
  CDLM:
    path_pattern: "CDLM_v1_1"
    preferred_for: [interpretive, cross_domain, discovery]
    cost_weight: 0.7
  RM:
    path_pattern: "RM_v2_0"
    preferred_for: [interpretive, resonance, cross_domain]
    cost_weight: 0.6
  MSR:
    path_pattern: "MSR_v3_0"
    preferred_for: [factual, interpretive, cross_domain]
    cost_weight: 0.9
  LEL:
    path_pattern: "LIFE_EVENT_LOG_v1_2"
    preferred_for: [factual, temporal, retrodictive]
    cost_weight: 0.8
  REPORT_FINANCIAL:
    path_pattern: "REPORT_FINANCIAL_v2_1"
    preferred_for: [interpretive, financial, domain_specific]
    cost_weight: 0.7
  REPORT_CAREER_DHARMA:
    path_pattern: "REPORT_CAREER_DHARMA_v1_1"
    preferred_for: [interpretive, career, domain_specific]
    cost_weight: 0.7
  REPORT_HEALTH_LONGEVITY:
    path_pattern: "REPORT_HEALTH_LONGEVITY_v1_1"
    preferred_for: [interpretive, health, domain_specific]
    cost_weight: 0.7
  REPORT_RELATIONSHIPS:
    path_pattern: "REPORT_RELATIONSHIPS_v1_1"
    preferred_for: [interpretive, relationships, domain_specific]
    cost_weight: 0.7

mirror_pairs:
  MP.1:
    description: "CLAUDE.md ↔ .geminirules structural parity"
    claude_side: "CLAUDE.md"
    gemini_side: ".geminirules"
    enforcement_rule: "Compare structural blocks: mandatory-reading list, governance-rebuild banner, canonical-path table, project-overview block, Collaboration section. FAIL on structural-block mismatch or canonical-ID disagreement in shared subset."
    known_asymmetries:
      - "Claude-side contains Claude Code / MCP / skills references with no Gemini equivalent"
      - "Gemini-side contains Gemini-rules idiom / Gemini-tool expectations with no Claude equivalent"
    mirror_mode: adapted_parity
    authoritative_side: claude

  MP.2:
    description: "Claude composite state ↔ .gemini/project_state.md"
    claude_side: "composite(00_ARCHITECTURE/SESSION_LOG.md + 00_ARCHITECTURE/CURRENT_STATE_v1_0.md)"
    gemini_side: ".gemini/project_state.md"
    enforcement_rule: "Compare state-snapshot facts: current executed step, next step, canonical corpus state block versions. FAIL on state disagreement."
    known_asymmetries:
      - "Claude-side is a composite of multiple files; Gemini-side is a single file"
      - "SESSION_LOG history is Claude-only; Gemini-side carries only the current state, not history"
    mirror_mode: adapted_parity_state
    authoritative_side: claude

  MP.3:
    description: "MACRO_PLAN_v2_0.md ↔ Gemini-side compact MP summary"
    claude_side: "00_ARCHITECTURE/MACRO_PLAN_v2_0.md"
    gemini_side: "compact MP summary in .geminirules item #3 + .gemini/project_state.md"
    enforcement_rule: "Compare MP version pointer, ten-macro-phase arc names M1-M10. FAIL on version disagreement or macro-phase-name disagreement."
    known_asymmetries:
      - "Gemini-side is a compact summary; Claude-side is the full plan"
    mirror_mode: adapted_parity_summary
    authoritative_side: claude

  MP.4:
    description: "PHASE_B_PLAN_v1_0.md ↔ Gemini-side phase pointer"
    claude_side: "00_ARCHITECTURE/PHASE_B_PLAN_v1_0.md"
    gemini_side: "current-phase pointer in .gemini/project_state.md + .geminirules item #4"
    enforcement_rule: "Compare PHASE_B_PLAN version pointer, pause-during-rebuild banner. FAIL on version disagreement."
    known_asymmetries:
      - "Gemini-side carries only the current-phase pointer; the full B.0–B.10 plan is Claude-only"
    mirror_mode: adapted_parity_summary
    authoritative_side: claude

  MP.5:
    description: "FILE_REGISTRY (now CAPABILITY_MANIFEST) ↔ Gemini-side L2.5 path block"
    claude_side: "00_ARCHITECTURE/CAPABILITY_MANIFEST.json"
    gemini_side: "L2.5 canonical-path block in .geminirules layer-architecture section"
    enforcement_rule: "Compare L2.5 path subset Gemini-side carries (MSR_v3_0 / UCN_v4_0 / CDLM_v1_1 / CGM_v9_0 / RM_v2_0) against manifest entries. FAIL on path disagreement."
    known_asymmetries:
      - "Gemini-side carries only L2.5 paths relevant to L4 Discovery Layer; does not mirror full manifest inventory"
    mirror_mode: adapted_parity_subset
    authoritative_side: claude

  MP.6:
    description: "GOVERNANCE_STACK (Claude-only)"
    claude_side: "00_ARCHITECTURE/GOVERNANCE_STACK_v1_0.md"
    gemini_side: null
    enforcement_rule: "No enforcement; declared Claude-only. mirror_enforcer.py emits PASS_DECLARED_CLAUDE_ONLY."
    known_asymmetries: []
    mirror_mode: claude_only
    authoritative_side: claude

  MP.7:
    description: "SESSION_LOG (Claude-only)"
    claude_side: "00_ARCHITECTURE/SESSION_LOG.md"
    gemini_side: null
    enforcement_rule: "No enforcement; declared Claude-only per Step 5A decision. mirror_enforcer.py emits PASS_DECLARED_CLAUDE_ONLY."
    known_asymmetries: []
    mirror_mode: claude_only
    authoritative_side: claude

  MP.8:
    description: "PROJECT_ARCHITECTURE_v2_2.md ↔ Gemini-side architecture summary"
    claude_side: "00_ARCHITECTURE/PROJECT_ARCHITECTURE_v2_2.md"
    gemini_side: "compact architecture block in .geminirules + .gemini/project_state.md"
    enforcement_rule: "Compare architecture version pointer, five-layer L0-L4 names, mirror-pair inventory cite. FAIL on version disagreement or layer-naming disagreement."
    known_asymmetries:
      - "Gemini-side carries a compact architecture summary; full v2.2 text is Claude-only"
    mirror_mode: adapted_parity_summary
    authoritative_side: claude

  MP.9:
    description: "OBSERVATORY_PLAN_v1_0.md ↔ Gemini-side Phase O concurrent-workstream summary"
    claude_side: "00_ARCHITECTURE/OBSERVATORY_PLAN_v1_0.md"
    gemini_side: "Phase O concurrent-workstream block in .geminirules §E + .gemini/project_state.md"
    enforcement_rule: "Compare OBSERVATORY_PLAN version pointer, Phase O sub-phase status flags (O.0..O.4), and concurrent-workstream gate-status. FAIL on version disagreement or status-flag drift."
    known_asymmetries:
      - "Claude-side is the full 10-section plan with the 30-session matrix; Gemini-side carries the workstream pointer + active-status block only"
      - "Per-session status updates land Claude-side at each session's SESSION_LOG entry; Gemini-side reflects sub-phase-level status only"
    mirror_mode: adapted_parity_summary
    authoritative_side: claude
    declared_at_session: PHASE_O_S0_1_OBSERVATORY_GOVERNANCE_BOOTSTRAP

